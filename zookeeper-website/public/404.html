<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Page Not Found | Apache ZooKeeper</title>
    <style>
      @font-face {
        font-family: Inter;
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url("/fonts/inter-latin-wght-normal.woff2") format("woff2");
      }

      :root {
        color-scheme: light;
        --radius: 0.625rem;
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --border: oklch(0.922 0 0);
        --primary: oklch(55.31% 0.12 136.93);
        --primary-strong: oklch(0.4 0.13 145);
        --primary-foreground: oklch(0.985 0 0);
        --ring: oklch(0.708 0 0);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --background: oklch(0.17 0 0);
          --foreground: oklch(0.92 0 0);
          --muted-foreground: oklch(0.62 0 0);
          --border: oklch(0.3 0 0);
          --primary: oklch(55.31% 0.12 136.93);
          --primary-strong: oklch(0.4 0.13 145);
          --primary-foreground: oklch(97% 0 0);
          --ring: oklch(55.31% 0.12 136.93);
        }
      }

      html.light {
        color-scheme: light;
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0 0);
        --muted-foreground: oklch(0.556 0 0);
        --border: oklch(0.922 0 0);
        --primary: oklch(55.31% 0.12 136.93);
        --primary-strong: oklch(0.4 0.13 145);
        --primary-foreground: oklch(0.985 0 0);
        --ring: oklch(0.708 0 0);
      }

      html.dark {
        color-scheme: dark;
        --background: oklch(0.17 0 0);
        --foreground: oklch(0.92 0 0);
        --muted-foreground: oklch(0.62 0 0);
        --border: oklch(0.3 0 0);
        --primary: oklch(55.31% 0.12 136.93);
        --primary-strong: oklch(0.4 0.13 145);
        --primary-foreground: oklch(97% 0 0);
        --ring: oklch(55.31% 0.12 136.93);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(85, 147, 67, 0.14), transparent 32rem),
          var(--background);
        color: var(--foreground);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 2rem;
      }

      .content {
        width: min(100%, 42rem);
        padding: clamp(2rem, 6vw, 4rem);
        text-align: center;
      }

      .logo {
        width: 9rem;
        height: auto;
        margin-bottom: 2rem;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted-foreground);
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }

      h1 {
        margin: 1rem 0 0;
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        line-height: 1;
        letter-spacing: -0.05em;
      }

      .message {
        margin: 1.25rem auto 0;
        max-width: 34rem;
        color: var(--muted-foreground);
        font-size: clamp(1.125rem, 2vw, 1.25rem);
        line-height: 1.65;
      }

      .actions {
        display: flex;
        justify-content: center;
        margin-top: 2rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        height: 2.5rem;
        padding: 0.5rem 1.5rem;
        border: 1px solid transparent;
        border-radius: calc(var(--radius) - 2px);
        background: var(--primary);
        color: var(--primary-foreground);
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.25rem;
        text-decoration: none;
        white-space: nowrap;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        outline: none;
        transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      .button:hover {
        background: color-mix(in oklch, var(--primary) 90%, transparent);
      }

      html.dark .button {
        background: var(--primary-strong);
      }

      html.dark .button:hover {
        background: color-mix(in oklch, var(--primary-strong) 90%, transparent);
      }

      @media (prefers-color-scheme: dark) {
        .button {
          background: var(--primary-strong);
        }

        .button:hover {
          background: color-mix(in oklch, var(--primary-strong) 90%, transparent);
        }
      }

      html.light .button {
        background: var(--primary);
      }

      html.light .button:hover {
        background: color-mix(in oklch, var(--primary) 90%, transparent);
      }

      .button:focus-visible {
        border-color: var(--ring);
        box-shadow:
          0 1px 2px 0 rgb(0 0 0 / 0.05),
          0 0 0 3px color-mix(in oklch, var(--ring) 50%, transparent);
      }
    </style>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          var root = document.documentElement;

          if (theme === "light" || theme === "dark") {
            root.classList.add(theme);
          }
        } catch (_) {
          // Keep the CSS prefers-color-scheme fallback if storage is unavailable.
        }
      })();
    </script>
  </head>
  <body>
    <main>
      <section class="content" aria-labelledby="page-title">
        <img class="logo" src="/images/logo.svg" alt="Apache ZooKeeper" />
        <p class="eyebrow">404</p>
        <h1 id="page-title">Page not found</h1>
        <p class="message">
          The website was updated recently, so the route you were trying to visit might have
          changed.
        </p>
        <div class="actions">
          <a class="button" href="/">Go back home</a>
        </div>
      </section>
    </main>
  </body>
</html>
